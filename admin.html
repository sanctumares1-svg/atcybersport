<!DOCTYPE html>
<!-- ============================================================
     АДМИН-ПАНЕЛЬ (admin.html)
     Две части:
       • #loginScreen — экран входа по паролю;
       • #adminPanel  — сама панель с вкладками: товары, категории,
                        заказы, настройки.
     Внизу — два модальных окна-редактора: товара (#editorModal) и
     категории (#catEditorModal). Вся логика — в assets/admin.js.
     ВНИМАНИЕ по безопасности: пароль проверяется в браузере, это не
     настоящая защита. Не выкладывайте admin.html в открытый доступ
     без защиты хостинга — см. README, раздел «Безопасность».
     ============================================================ -->
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Админ-панель — AT Cybersport</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="assets/styles.css">
<style>
  body{background:var(--bg);}
  .a-shell{max-width:1000px;margin:0 auto;padding:0 20px 100px;}
  .a-top{display:flex;align-items:center;justify-content:space-between;padding:22px 0;border-bottom:1px solid var(--hairline-soft);position:sticky;top:0;background:rgba(8,8,10,.9);backdrop-filter:blur(14px);z-index:50;margin-bottom:8px;}
  .a-top .brand b{font-size:16px;}
  .a-top .brand span{color:var(--muted-2);}
  .a-logout{background:none;border:1px solid var(--line);color:var(--muted);padding:9px 16px;border-radius:100px;cursor:pointer;font-size:13px;}
  .a-logout:hover{border-color:var(--line-hover);color:var(--text);}

  /* login */
  .login-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;}
  .login-box{width:min(360px,100%);border:1px dashed var(--line);padding:40px 34px;text-align:center;}
  .login-box img{width:52px;margin:0 auto 20px;}
  .login-box h1{font-size:22px;font-weight:800;margin:0 0 6px;text-transform:lowercase;}
  .login-box p{color:var(--muted);font-size:13px;margin:0 0 24px;}
  .login-box input{width:100%;background:#111114;border:1px solid var(--line);color:var(--text);padding:13px 15px;border-radius:10px;font-size:15px;font-family:var(--font);}
  .login-box input:focus{outline:none;border-color:var(--line-hover);}
  .login-box button{width:100%;margin-top:14px;padding:14px;border:none;border-radius:100px;background:var(--invert-bg);color:var(--invert-text);font-weight:700;cursor:pointer;font-size:15px;}
  .login-err{color:#ff6b6b;font-size:13px;margin-top:12px;display:none;}
  .login-hint{color:var(--dim);font-size:11px;margin-top:18px;font-family:var(--mono);letter-spacing:.05em;}

  /* tabs */
  .tab-nav{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 24px;}
  .tab{font-family:var(--mono);font-size:13px;letter-spacing:.06em;background:transparent;border:1px dashed var(--line);color:#cfcfd4;padding:11px 20px;border-radius:100px;cursor:pointer;transition:.2s;}
  .tab.on{background:var(--invert-bg);color:var(--invert-text);border-color:var(--invert-bg);}

  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
  .panel-head h2{font-size:clamp(24px,4vw,34px);font-weight:800;margin:0;text-transform:lowercase;color:var(--head-muted);}
  .a-add{background:var(--invert-bg);color:var(--invert-text);border:none;padding:12px 22px;border-radius:100px;font-weight:700;cursor:pointer;font-size:14px;}

  /* rows */
  .a-row{display:flex;align-items:center;gap:16px;padding:14px 16px;border:1px dashed var(--line);margin-bottom:10px;}
  .a-thumb{width:56px;height:56px;flex-shrink:0;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--dim);}
  .a-thumb img{max-width:88%;max-height:88%;object-fit:contain;}
  .a-info{flex:1;min-width:0;}
  .a-name{font-weight:600;font-size:16px;}
  .a-name em{font-family:var(--mono);font-size:11px;color:var(--invert-text);background:var(--invert-bg);padding:2px 7px;border-radius:5px;font-style:normal;margin-left:6px;}
  .a-sub{font-size:13px;color:var(--muted);margin-top:3px;}
  .a-sub s{color:var(--dim);}
  .a-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .a-btn{background:transparent;border:1px solid var(--line);color:var(--text);padding:9px 15px;border-radius:100px;cursor:pointer;font-size:13px;font-family:var(--font);transition:.2s;}
  .a-btn:hover{border-color:var(--line-hover);}
  .a-btn.primary{background:var(--invert-bg);color:var(--invert-text);border-color:var(--invert-bg);font-weight:700;}
  .a-btn.danger:hover{border-color:#ff6b6b;color:#ff6b6b;}
  .a-empty{text-align:center;color:var(--dim);font-family:var(--mono);font-size:13px;padding:50px 0;letter-spacing:.05em;}

  /* orders */
  .a-order{border:1px dashed var(--line);padding:16px 18px;margin-bottom:10px;}
  .a-order.done{opacity:.55;}
  .a-order-head{display:flex;align-items:center;gap:8px;font-size:16px;flex-wrap:wrap;}
  .a-order-head a{color:var(--text);text-decoration:none;border-bottom:1px solid var(--line);}
  .a-order-total{margin-left:auto;font-weight:800;}
  .a-order-sub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:5px;}
  .a-order-items{font-size:14px;color:var(--text-2);margin-top:10px;}
  .a-order-comment{font-size:13px;color:var(--muted);margin-top:8px;background:rgba(255,255,255,.04);padding:8px 12px;border-radius:8px;}
  .a-order .a-actions{margin-top:12px;}

  /* editor modal */
  .a-modal{position:fixed;inset:0;z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;background:rgba(3,3,4,.72);backdrop-filter:blur(6px);overflow-y:auto;}
  .a-modal.open{display:flex;}
  .a-modal-box{width:min(640px,100%);background:#0b0b0d;border:1px solid var(--hairline);padding:28px;margin:auto;}
  .a-modal-box h3{margin:0 0 20px;font-size:22px;font-weight:800;text-transform:lowercase;}
  .a-field{margin-bottom:14px;}
  .a-field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--dim);margin-bottom:7px;text-transform:uppercase;}
  .a-field input[type=text],.a-field input[type=number],.a-field select,.a-field textarea{width:100%;background:#111114;border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:9px;font-size:15px;font-family:var(--font);}
  .a-field input:focus,.a-field select:focus,.a-field textarea:focus{outline:none;border-color:var(--line-hover);}
  .a-field input[type=checkbox]{margin-right:8px;transform:scale(1.2);}
  .a-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .a-sep{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;padding-top:16px;border-top:1px dashed var(--line);}
  .a-hint{font-size:12px;color:var(--dim);margin-bottom:12px;line-height:1.5;}
  .a-repeat{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .a-repeat input[type=text]{flex:1;background:#111114;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:var(--font);}
  .a-repeat input[type=color]{width:44px;height:40px;border:1px solid var(--line);border-radius:8px;background:#111;cursor:pointer;flex-shrink:0;}
  .a-repeat button{width:38px;height:38px;flex-shrink:0;border:1px solid var(--line);background:none;color:var(--muted);border-radius:8px;cursor:pointer;}
  .a-repeat button:hover{border-color:#ff6b6b;color:#ff6b6b;}
  .a-images{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .a-img{position:relative;width:84px;height:84px;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .a-img img{max-width:88%;max-height:88%;object-fit:contain;}
  .a-img .main{position:absolute;top:3px;left:3px;font-family:var(--mono);font-size:9px;background:var(--invert-bg);color:var(--invert-text);padding:1px 5px;border-radius:4px;}
  .a-img-actions{position:absolute;bottom:3px;right:3px;display:flex;gap:3px;}
  .a-img-actions button{width:22px;height:22px;border:none;background:rgba(0,0,0,.7);color:#fff;border-radius:5px;cursor:pointer;font-size:12px;line-height:1;}
  .a-upload{display:inline-block;border:1px dashed var(--line);color:var(--text);padding:11px 18px;border-radius:100px;cursor:pointer;font-size:13px;margin-bottom:6px;transition:.2s;}
  .a-upload:hover{border-color:var(--line-hover);}
  .a-modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px dashed var(--line);}
  .a-btnrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .a-saved{color:var(--success);font-size:13px;opacity:0;transition:opacity .3s;}
  .a-logo-preview{width:120px;height:70px;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;}
  .a-logo-preview img{max-width:80%;max-height:80%;object-fit:contain;}
  .settings-form{max-width:640px;}
  @media(max-width:600px){ .a-grid2{grid-template-columns:1fr;} .a-row{flex-wrap:wrap;} }
</style>
<script src="assets/app.js"></script>
</head>
<body>
<div class="at-glows"><i></i><i></i></div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <img src="assets/logo.png" alt="AT">
    <h1>админ-панель</h1>
    <p>AT Cybersport — управление магазином</p>
    <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
    <button id="loginBtn">Войти</button>
    <div class="login-err" id="loginErr">Неверный пароль</div>
    <div class="login-hint"></div>
  </div>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none">
  <div class="a-top">
    <a href="index.html" class="brand"><img src="assets/logo.png" alt="AT" style="width:32px;height:32px"><span class="bw"><b>AT</b><span>ADMIN</span></span></a>
    <button class="a-logout" id="logoutBtn">Выйти</button>
  </div>
  <div class="a-shell">
    <div class="tab-nav" id="tabNav"></div>

    <!-- ТОВАРЫ -->
    <div class="tab-panel" id="panel-products">
      <div class="panel-head"><h2>товары</h2><button class="a-add" id="addProductBtn">+ Добавить товар</button></div>
      <div id="productsList"></div>
    </div>

    <!-- КАТЕГОРИИ -->
    <div class="tab-panel" id="panel-categories" style="display:none">
      <div class="panel-head"><h2>категории</h2><button class="a-add" id="addCatBtn">+ Добавить категорию</button></div>
      <div id="categoriesList"></div>
    </div>

    <!-- ДРАЙВЕРА -->
    <div class="tab-panel" id="panel-drivers" style="display:none">
      <div class="panel-head"><h2>драйвера</h2><button class="a-add" id="addDriverBtn">+ Добавить драйвер</button></div>
      <div id="driversList"></div>
    </div>

    <!-- ЗАКАЗЫ -->
    <div class="tab-panel" id="panel-orders" style="display:none">
      <div class="panel-head"><h2>заказы</h2></div>
      <div id="ordersList"></div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div class="tab-panel" id="panel-settings" style="display:none">
      <div class="panel-head"><h2>настройки</h2></div>
      <div class="settings-form"></div>
    </div>
  </div>
</div>

<!-- РЕДАКТОР ТОВАРА -->
<div class="a-modal" id="editorModal">
  <div class="a-modal-box">
    <h3 id="editorTitle">Товар</h3>
    <div id="editorBody"></div>
    <div class="a-modal-foot">
      <button class="a-btn" id="editorCancel">Отмена</button>
      <button class="a-btn primary" id="editorSave">Сохранить товар</button>
    </div>
  </div>
</div>

<!-- РЕДАКТОР КАТЕГОРИИ -->
<div class="a-modal" id="catEditorModal">
  <div class="a-modal-box" style="max-width:460px">
    <h3 id="catEditorTitle">Категория</h3>
    <div id="catEditorBody"></div>
    <div class="a-modal-foot">
      <button class="a-btn" id="catCancel">Отмена</button>
      <button class="a-btn primary" id="catSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- РЕДАКТОР ДРАЙВЕРА -->
<div class="a-modal" id="drvEditorModal">
  <div class="a-modal-box">
    <h3 id="drvEditorTitle">Драйвер</h3>
    <div id="drvEditorBody"></div>
    <div class="a-modal-foot">
      <button class="a-btn" id="drvCancel">Отмена</button>
      <button class="a-btn primary" id="drvSave">Сохранить драйвер</button>
    </div>
  </div>
</div>

<script src="assets/admin.js"></script>
</body>
</html>
